    <style>
        :root {
            --primary-green: #2ecc71;

        body {

            display: flex;

            margin: 0;
        }

        .welcome-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .btn-main {
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
            margin-bottom: 1rem;
        }

        .btn-primary-green {
            background-color: var(--primary-green);
            color: white;
            border: none;
        }

        .btn-outline-custom {
            background-color: transparent;
            border: 2px solid #edf2f7;
            color: var(--dark-text);

        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        .modal-content { border-radius: 20px; border: none; padding: 1.5rem; }

<body>

    <div class="welcome-card shadow">
        <div class="mb-4">
            <i class="bi bi-recycle text-success" style="font-size: 4rem;"></i>
            <h1 class="fw-bold mt-3">EcoLogistics</h1>
            <p class="text-muted">Gestión inteligente de residuos urbanos</p>
        </div>

        <div class="mt-5">
            <button class="btn btn-main btn-primary-green shadow-sm" data-bs-toggle="modal" data-bs-target="#modalLogin">
                Identificarse
            </button>
            <button class="btn btn-main btn-outline-custom" data-bs-toggle="modal" data-bs-target="#modalRegistro">
                Crear Cuenta
            </button>
        </div>
        <small class="text-muted mt-4 d-block">© 2026 Sistema Operativo Madrid</small>
    </div>

    <div class="modal fade" id="modalLogin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Bienvenido de nuevo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form action="login.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">CORREO ELECTRÓNICO</label>
                            <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">CONTRASEÑA</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-main btn-primary-green m-0">Acceder al Sistema</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRegistro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Unirse a EcoLogistics</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form action="registro.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">NOMBRE Y APELLIDOS</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Juan Nadie" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CORREO ELECTRÓNICO</label>
                            <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CONTRASEÑA</label>
                            <input type="password" name="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">ROL DE USUARIO</label>
                            <select class="form-select border-0 bg-light" name="rol" required>
                                <option value="ciudadano">Ciudadano</option>
                                <option value="conductor">Conductor / Operario</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-main btn-primary-green m-0">Finalizar Registro</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
